<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        
        /* Tab Styling */
        .tab-container {
            display: flex;
            border-bottom: 2px solid #ccc;
            margin-bottom: 20px;
        }
        .tab-button {
            background-color: #e9e9e9;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 10px 20px;
            transition: 0.3s;
            font-size: 16px;
            border-radius: 5px 5px 0 0;
            margin-right: 5px;
        }
        .tab-button:hover {
            background-color: #ddd;
        }
        .tab-button.active {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }

        /* Search Bar Styling */
        .controls-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .search-input {
            padding: 8px 12px;
            width: 350px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 14px;
        }
        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #ddd;
            vertical-align: top;
        }
        th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        
        /* Specific Column Adjustments */
        .hash-col {
            font-family: monospace;
            font-size: 12px;
            color: #666;
            word-break: break-all;
            max-width: 120px;
        }
        .cve-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .cve-item {
            padding-bottom: 8px;
            border-bottom: 1px dashed #eee;
        }
        .cve-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .cve-desc {
            font-size: 12px;
            color: #555;
            display: block;
            margin-top: 2px;
        }
        
        /* Pagination Styling */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 15px;
            gap: 15px;
        }
        .page-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        .page-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .page-btn:hover:not(:disabled) {
            background-color: #0056b3;
        }
        .page-info {
            font-size: 14px;
            color: #555;
        }

        /* General Elements */
        .policy-desc {
            margin-bottom: 15px;
            color: #666;
            font-style: italic;
        }
        .unquarantine-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }
        .unquarantine-btn:hover {
            background-color: #c82333;
        }
        a {
            color: #007bff;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>Policy Dashboard</h1>
    
    <div class="tab-container" id="tab-header"></div>
    <div id="dashboard-container"></div>

    <script>
        let currentLibs = [];
        let filteredLibs = [];
        let currentPolicy = null;
        let currentPage = 1;
        const ITEMS_PER_PAGE = 1000;

        async function init() {
            try {
                const response = await fetch('policies.json');
                if (!response.ok) throw new Error("Failed to fetch policies.json");
                
                const policies = await response.json();
                renderTabs(policies);
                
                if (policies.length > 0) {
                    loadPolicyData(policies[0]);
                }
            } catch (error) {
                console.error(error);
                document.getElementById('dashboard-container').innerHTML = `<p style="color:red;">Error loading policies: ${error.message}</p>`;
            }
        }

        function renderTabs(policies) {
            const header = document.getElementById('tab-header');
            
            policies.forEach((policy, index) => {
                const btn = document.createElement('button');
                btn.className = 'tab-button';
                if (index === 0) btn.classList.add('active');
                btn.innerText = policy.name;
                
                btn.onclick = () => {
                    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadPolicyData(policy);
                };
                
                header.appendChild(btn);
            });
        }

        async function loadPolicyData(policy) {
            const container = document.getElementById('dashboard-container');
            container.innerHTML = '<p>Loading data...</p>';
            currentPolicy = policy;
            
            try {
                const response = await fetch(`${policy.name}/libs.json`);
                if (!response.ok) throw new Error(`libs.json not found for ${policy.name}`);
                
                let fetchedLibs = await response.json();
                
                // Enforce 10k limit client-side just in case
                const MAX_RECORDS = 10000;
                if (fetchedLibs.length > MAX_RECORDS) {
                    currentLibs = fetchedLibs.slice(0, MAX_RECORDS);
                } else {
                    currentLibs = fetchedLibs;
                }
                
                container.innerHTML = `
                    <h2>${policy.name}</h2>
                    <p class="policy-desc">${policy.description}</p>
                    
                    <div class="controls-container">
                        <input type="text" id="searchInput" class="search-input" placeholder="Search name, repo, hash, or CVE..." onkeyup="handleSearch()">
                        <div class="page-info" id="total-results-info"></div>
                    </div>
                    
                    <div id="table-container"></div>
                    
                    <div class="pagination" id="pagination-container">
                        <button class="page-btn" id="prev-btn" onclick="changePage(-1)">Previous</button>
                        <span class="page-info" id="page-info"></span>
                        <button class="page-btn" id="next-btn" onclick="changePage(1)">Next</button>
                    </div>
                `;
                
                if (fetchedLibs.length > MAX_RECORDS) {
                    const info = document.getElementById('total-results-info');
                    info.innerText = `Warning: Displaying first ${MAX_RECORDS} of ${fetchedLibs.length} total libraries.`;
                    info.style.color = "red";
                }
                
                handleSearch();
                
            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <h2>${policy.name}</h2>
                    <p class="policy-desc">${policy.description}</p>
                    <p style="color:red;">Error loading data for ${policy.name}. Ensure ${policy.name}/libs.json exists.</p>
                `;
            }
        }

        function handleSearch() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            filteredLibs = currentLibs.filter(lib => {
                const nameMatch = (lib.name || '').toLowerCase().includes(searchTerm);
                const repoMatch = (lib.repo_name || '').toLowerCase().includes(searchTerm);
                const hashMatch = (lib.hash || '').toLowerCase().includes(searchTerm);
                const idMatch = (lib.qurantined_id || '').toLowerCase().includes(searchTerm);
                
                // Check if any of the nested CVEs match the search term
                const cveMatch = (lib.cve || []).some(c => 
                    (c.name || '').toLowerCase().includes(searchTerm) || 
                    (c.cve_short_desc || '').toLowerCase().includes(searchTerm)
                );
                
                return nameMatch || repoMatch || hashMatch || idMatch || cveMatch;
            });
            
            currentPage = 1;
            
            if (document.getElementById('total-results-info').style.color !== "red") {
                document.getElementById('total-results-info').innerText = `Total matching libraries: ${filteredLibs.length}`;
            }
            
            renderTable();
        }

        function renderTable() {
            const tableContainer = document.getElementById('table-container');
            
            if (filteredLibs.length === 0) {
                tableContainer.innerHTML = '<p>No libraries found matching your criteria.</p>';
                updatePaginationControls();
                return;
            }

            const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
            const endIndex = startIndex + ITEMS_PER_PAGE;
            const paginatedLibs = filteredLibs.slice(startIndex, endIndex);

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Repo</th>
                            <th>Hash</th>
                            <th>Quarantine Date</th>
                            <th>Q-ID</th>
                            <th>CVE Details</th>
                            ${currentPolicy.allow_unqurantine ? '<th>Action</th>' : ''}
                        </tr>
                    </thead>
                    <tbody>
            `;

            paginatedLibs.forEach(lib => {
                // Generate HTML for the nested CVE array
                let cveHtml = '';
                if (lib.cve && Array.isArray(lib.cve) && lib.cve.length > 0) {
                    cveHtml = '<div class="cve-container">';
                    lib.cve.forEach(c => {
                        cveHtml += `
                            <div class="cve-item">
                                <strong><a href="${c.cve_link || '#'}" target="_blank">${c.name || 'Unknown CVE'}</a></strong>
                                <span class="cve-desc">${c.cve_short_desc || 'No description provided.'}</span>
                            </div>
                        `;
                    });
                    cveHtml += '</div>';
                } else {
                    cveHtml = '<em>No CVE data</em>';
                }

                html += `
                    <tr>
                        <td>${lib.name || 'N/A'}</td>
                        <td>${lib.repo_name || 'N/A'}</td>
                        <td class="hash-col">${lib.hash || 'N/A'}</td>
                        <td>${lib.quarantine_date || 'N/A'}</td>
                        <td>${lib.qurantined_id || 'N/A'}</td>
                        <td>${cveHtml}</td>
                        ${currentPolicy.allow_unqurantine ? `<td><button class="unquarantine-btn" onclick="handleUnquarantine('${lib.qurantined_id}')">Unquarantine</button></td>` : ''}
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            tableContainer.innerHTML = html;
            
            updatePaginationControls();
        }

        function updatePaginationControls() {
            const totalPages = Math.ceil(filteredLibs.length / ITEMS_PER_PAGE) || 1;
            document.getElementById('page-info').innerText = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prev-btn').disabled = (currentPage === 1);
            document.getElementById('next-btn').disabled = (currentPage === totalPages);
        }

        function changePage(direction) {
            currentPage += direction;
            renderTable();
        }

        function handleUnquarantine(quarantineId) {
            alert(`Unquarantine requested for ID: ${quarantineId}`);
        }

        init();
    </script>
</body>
</html>
